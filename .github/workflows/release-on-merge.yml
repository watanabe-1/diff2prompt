name: Release on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - "package.json"

permissions: {}

jobs:
  release:
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'release/v') && github.event.pull_request.user.login == 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
    outputs:
      version: ${{ steps.validate_version.outputs.version }}
      release_sha: ${{ github.sha }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          node-version: aqua
          bun-version: aqua
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Get version from package.json
        id: get_version
        run: echo "version=$(bun -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Validate version
        id: validate_version
        env:
          PACKAGE_VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          if [[ "$PACKAGE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "Invalid package version: $PACKAGE_VERSION"
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.validate_version.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "Release v${VERSION}" \
            --verify-tag \
            --fail-on-no-commits \
            --generate-notes

      # Trusted Publishing requires recent npm (OIDC support).
      - name: Upgrade npm
        run: npm i -g npm@latest

      - name: Publish to npm
        run: npm publish

  tag_prs:
    needs: release
    uses: ./.github/workflows/add-version-to-pr-title.yml
    with:
      version: ${{ needs.release.outputs.version }}
    permissions:
      contents: read
      pull-requests: write
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
