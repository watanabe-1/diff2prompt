name: Release on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - "package.json"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'release/v') && github.event.pull_request.user.login == 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate_version.outputs.version }}
      release_sha: ${{ github.sha }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .tool-versions
          registry-url: https://registry.npmjs.org/

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .tool-versions

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Get version from package.json
        id: get_version
        run: echo "version=$(bun -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Validate version
        id: validate_version
        env:
          PACKAGE_VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          if [[ "$PACKAGE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "Invalid package version: $PACKAGE_VERSION"
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.validate_version.outputs.version }}" \
            --title "Release v${{ steps.validate_version.outputs.version }}" \
            --verify-tag \
            --fail-on-no-commits \
            --generate-notes

      # Trusted Publishing requires recent npm (OIDC support).
      - name: Upgrade npm
        run: npm i -g npm@latest

      - name: Publish to npm
        run: npm publish

  tag_prs:
    needs: release
    uses: ./.github/workflows/add-version-to-pr-title.yml
    with:
      version: ${{ needs.release.outputs.version }}
    permissions:
      pull-requests: write
    secrets: inherit
