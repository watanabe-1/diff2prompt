name: Create Release PR

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

jobs:
  check-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      not_on_main: ${{ steps.check.outputs.not_on_main }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch main branch
        run: git fetch origin main

      - name: Check if tag is on main
        id: check
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          if ! [[ "$TAG_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG_REF"
            exit 1
          fi
          tag_commit=$(git rev-list -n 1 "$TAG_REF")
          main_commit=$(git rev-parse origin/main)
          base_commit=$(git merge-base "$tag_commit" "$main_commit")
          if [ "$base_commit" != "$tag_commit" ]; then
            echo "not_on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "not_on_main=false" >> "$GITHUB_OUTPUT"
          fi

  create-pr:
    needs: check-tag
    if: needs.check-tag.outputs.not_on_main == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          node-version: aqua

      - name: Extract version from tag
        id: extract_version
        run: |
          tag_ref="${GITHUB_REF#refs/tags/}"
          if [[ "$tag_ref" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "Invalid tag format: $tag_ref"
            exit 1
          fi

      - name: Get default branch
        id: default_branch
        run: |
          branch=$(git remote show origin | grep 'HEAD branch' | awk '{print $NF}')
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Setup Git user
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Bump version
        env:
          VERSION: ${{ steps.extract_version.outputs.version }}
        run: |
          npm version "$VERSION" --no-git-tag-version
          git add package.json

      - name: Get previous tag
        id: previous_tag
        env:
          VERSION: ${{ steps.extract_version.outputs.version }}
        run: |
          prev_tag=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^v${VERSION}$" | head -n 1)
          echo "tag=$prev_tag" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        env:
          PREVIOUS_TAG: ${{ steps.previous_tag.outputs.tag }}
        run: |
          changelog=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s" | grep -v 'chore: bump version')
          {
            echo "changelog<<EOF"
            echo "$changelog"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          sign-commits: true
          branch: release/v${{ steps.extract_version.outputs.version }}
          base: ${{ steps.default_branch.outputs.branch }}
          commit-message: "chore: bump version to v${{ steps.extract_version.outputs.version }}"
          title: "Release v${{ steps.extract_version.outputs.version }}"
          body: |
            This PR prepares the release of v${{ steps.extract_version.outputs.version }}

            ## Changes

            ${{ steps.changelog.outputs.changelog }}
          delete-branch: false
          token: ${{ secrets.GITHUB_TOKEN }}
