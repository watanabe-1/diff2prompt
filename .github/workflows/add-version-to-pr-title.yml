name: Tag PRs with Release Version

on:
  workflow_call:
    inputs:
      version:
        description: "Release version"
        required: true
        type: string
    secrets:
      github-token:
        required: true

jobs:
  tag_prs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate version input
        id: validate_version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "Invalid version input: $INPUT_VERSION"
            exit 1
          fi

      - name: Get previous tag
        id: previous_tag
        env:
          VERSION: ${{ steps.validate_version.outputs.version }}
        run: |
          prev_tag=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^v${VERSION}$" | head -n 1)
          echo "tag=$prev_tag" >> "$GITHUB_OUTPUT"

      - name: Find merged PRs between tags
        id: find_prs
        env:
          PREVIOUS_TAG: ${{ steps.previous_tag.outputs.tag }}
          VERSION: ${{ steps.validate_version.outputs.version }}
        run: |
          prs=$(git log --pretty=format:"%s" "${PREVIOUS_TAG}..v${VERSION}" \
            | grep -v 'chore: bump version' \
            | grep -oE '#[0-9]+' \
            | tr -d '#' \
            | xargs || true)
          echo "prs=${prs}" >> "$GITHUB_OUTPUT"

      - name: Tag PR titles with release version
        env:
          GH_TOKEN: ${{ secrets.github-token }}
          PRS: ${{ steps.find_prs.outputs.prs }}
          VERSION: ${{ steps.validate_version.outputs.version }}
        run: |
          for pr in $PRS; do
            title=$(gh pr view "$pr" --json title -q ".title")
            if [[ "$title" != *"[v${VERSION}]"* ]]; then
              gh pr edit "$pr" --title "$title [v${VERSION}]"
            else
              echo "PR #$pr already includes version"
            fi
          done
