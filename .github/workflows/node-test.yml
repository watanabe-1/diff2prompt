name: Node test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        node-version: [18, 20, 22, 24, aqua]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          node-version: ${{ matrix.node-version }}
          bun-version: aqua
          bun-cache: "true"

      - name: Install base dependencies
        run: bun install --frozen-lockfile

      - name: Print versions
        run: |
          node -v

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Package smoke test
        run: bun run test:package

      - name: Test
        env:
          NODE_VERSION: ${{ matrix.node-version }}
        run: |
          if [ "$NODE_VERSION" = "aqua" ]; then
            npm run test:coverage
          else
            npm run test
          fi

      - name: Report Coverage
        if: ${{ matrix.node-version == 'aqua' }}
        uses: davelosert/vitest-coverage-report-action@02f3c2e641286b7fa308cd3e430783103ce6103b # v2.12.0
        with:
          comment-on: ${{ github.event_name == 'pull_request' && 'pr' || 'commit' }}

  status-check:
    name: Node test status check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    if: always()
    needs:
      - node-test
    steps:
      - name: Check required job result
        env:
          NODE_TEST_RESULT: ${{ needs.node-test.result }}
        run: |
          if [ "$NODE_TEST_RESULT" = "success" ]; then
            exit 0
          fi
          echo "node-test result: $NODE_TEST_RESULT"
          exit 1
