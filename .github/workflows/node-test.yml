name: Node test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [18, 20, 22, aqua]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          node-version: ${{ matrix.node-version }}
          bun-version: aqua
          bun-cache: "true"

      - name: Install base dependencies
        run: bun install --frozen-lockfile

      - name: Print versions
        run: |
          node -v

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Test
        run: |
          if [ "${{ matrix.node-version }}" = "aqua" ]; then
            npm run test:coverage
          else
            npm run test
          fi

      - name: Upload coverage
        if: ${{ matrix.node-version == 'aqua' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage

  status-check:
    name: Node test status check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    needs:
      - node-test
    steps:
      - name: Check required job result
        env:
          NODE_TEST_RESULT: ${{ needs.node-test.result }}
        run: |
          if [ "$NODE_TEST_RESULT" = "success" ]; then
            exit 0
          fi
          echo "node-test result: $NODE_TEST_RESULT"
          exit 1
