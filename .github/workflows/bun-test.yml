name: Bun test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bun-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: ["1.1.0", "1.2.0", "tool-versions"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version-file: .tool-versions

      - name: Install base dependencies
        run: |
          if [ "${{ matrix.bun-version }}" = "tool-versions" ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi

      - name: Print version
        run: |
          bun -v

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      # --- Restore Bun back to matrix for the rest ---
      - name: Restore Bun (from matrix)
        if: matrix.bun-version != 'tool-versions'
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install deps for Test (matrix Bun)
        run: |
          if [ "${{ matrix.bun-version }}" = "tool-versions" ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi

      - name: Print version
        run: |
          bun -v

      - name: Test
        run: bun run test
