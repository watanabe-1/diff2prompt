name: Bun test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bun-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: ["1.1.0", "1.2.0", "aqua"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup toolchain (from aqua/aqua.yaml)
        uses: ./.github/actions/setup-toolchain
        with:
          bun-version: aqua
          bun-cache: "true"

      - name: Install base dependencies
        run: |
          if [ "${{ matrix.bun-version }}" = "aqua" ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi

      - name: Print version
        run: |
          bun -v

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      # --- Restore Bun back to matrix for the rest ---
      - name: Restore Bun (from matrix)
        if: matrix.bun-version != 'aqua'
        uses: ./.github/actions/setup-toolchain
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install deps for Test (matrix Bun)
        run: |
          if [ "${{ matrix.bun-version }}" = "aqua" ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi

      - name: Print version
        run: |
          bun -v

      - name: Test
        run: bun run test
